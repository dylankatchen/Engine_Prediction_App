version: "1.0"
services:
  zookeeper:
    image: bitnami/zookeeper:latest
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      - ALLOW_ANONYMOUS_LOGIN=yes
  kafka:
    image: bitnami/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      - KAFKA_BROKER_ID=1
      - KAFKA_ZOOKEEPER_CONNECT=zookeeper:2181
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092
      - ALLOW_PLAINTEXT_LISTENER=yes
    depends_on:
      - zookeeper
  postgres:
    image: postgres:16
    container_name: postgres
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
  maintenance-api:
    build: ./maintenance-api
    container_name: maintenance-api
    ports:
      - "8080:8080"
    environment: KAFKA_BOOTSTRAP_SERVERS=kafka:9092 SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/m SPRING_DATASOURCE_USERNAME=postgres SPRING_DATASOURCE_PASSWORD=postgres
    depends_on:
      - kafka
      - postgres
  ml-service:
    build: ./ml-service
    container_name: ml-service
    ports:
      - "5000:5000"
    environment: MODEL_PATH=/app/model/rul_model.pkl
    depends_on:
      - postgres
  volumes:
    postgres_data:
